<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chat Privado</title>

	<style>
	*{box-sizing:border-box;}
	body{margin:0;font-family:system-ui,Arial;background:#e5ddd5;display:flex;justify-content:center;align-items:center;height:100vh;}
	.chat-app{width:100%;max-width:900px;height:95vh;background:white;display:flex;flex-direction:column;border-radius:10px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2);}
	.header{background:#075E54;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
	.status{font-size:13px;opacity:.9;}
	.login{padding:15px;border-bottom:1px solid #ddd;display:flex;gap:10px;flex-wrap:wrap;}
	.login input{padding:10px;border:1px solid #ccc;border-radius:5px;}
	.login button{padding:10px 20px;border:none;background:#25D366;color:white;border-radius:5px;cursor:pointer;}
	.messages{flex:1;padding:20px;overflow-y:auto;background:#e5ddd5;display:flex;flex-direction:column;gap:10px;}
	.message{max-width:70%;padding:10px 14px;border-radius:10px;position:relative;font-size:14px;}
	.me{align-self:flex-end;background:#dcf8c6;}
	.other{align-self:flex-start;background:white;}
	.meta{font-size:11px;opacity:.7;margin-top:4px;display:flex;align-items:center;gap:6px;}
	.btn-seen{font-size:10px;padding:3px 8px;border:none;background:#1976d2;color:white;border-radius:12px;cursor:pointer;transition:.2s;}
	.btn-seen:hover{background:#125ea7;}
	.input-area{display:flex;padding:10px;background:#f0f0f0;gap:10px;}
	.input-area input{flex:1;padding:12px;border:1px solid #ccc;border-radius:20px;outline:none;}
	.input-area button{background:#25D366;border:none;color:white;padding:0 20px;border-radius:20px;cursor:pointer;}
	@media(max-width:600px){.message{max-width:85%;}}
	</style>
</head>

<body>

<div class="chat-app">
	<div class="header">
		<div>Chat Privado</div>
		<div id="status" class="status">Desconectado</div>
	</div>

	<div class="login">
		<input id="origen" placeholder="Mi ID">
		<input id="destino" placeholder="Destino">
		<button onclick="connect()">Conectar</button>
	</div>

	<div id="messages" class="messages"></div>

	<div class="input-area">
		<input id="mensaje" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter')sendMessage()">
		<button onclick="sendMessage()">Enviar</button>
	</div>
</div>

<script>
let socket
let origen
let tempMap = {}
const messages = document.getElementById("messages")

function addMessage(text,type,state="",id="",showSeenButton=false){
	const div=document.createElement("div")
	div.className="message "+type
	div.id=id
	let btn=""
	if(showSeenButton){
		btn=`<button class="btn-seen" onclick="marcarVisto('${id}')">✔ visto</button>`
	}
	div.innerHTML=`
		<div>${text}</div>
		<div class="meta">${state} ${btn}</div>
	`
	messages.appendChild(div)
	messages.scrollTop=messages.scrollHeight
}

function updateState(id,state){
	const el=document.getElementById(id)
	if(!el) return
	el.querySelector(".meta").innerHTML=state
}

function markDisappeared(id){
	const el=document.getElementById(id)
	if(el){
		el.querySelector(".meta").innerHTML="❌ Desaparecido"
		el.style.opacity="0.6"
	}
}

function markDesconocido(id){
	const el=document.getElementById(id)
	if(el){
		el.querySelector(".meta").innerHTML="❌ Desconocido"
		el.style.opacity="0.6"
	}
}

function connect(){
	origen=document.getElementById("origen").value.trim()
	if(!origen) return alert("Ingresa tu ID")
	socket=new WebSocket("ws://192.168.1.9:2345")

	socket.onopen=function(){
		document.getElementById("status").innerText="Conectado"
		socket.send(JSON.stringify({origen:origen}))
	}

	socket.onclose=function(){
		document.getElementById("status").innerText="Desconectado"
	}

	socket.onmessage=function(event){
		const data=JSON.parse(event.data)
		switch(data.type){
			case "sent":
				const tempId=tempMap.last
				const elSent=document.getElementById(tempId)
				if(elSent){
					elSent.id="msg-"+data.mensajeId
					updateState("msg-"+data.mensajeId,"✔ Enviado")
				}
				break
			case "delivered":
				updateState("msg-"+data.mensajeId,"✔ Entregado")
				break
			case "seen":
				updateState("msg-"+data.mensajeId,"✔✔ Visto")
				break
			case "message":
				addMessage(
					data.origen+": "+data.mensaje,
					"other",
					"",
					"msg-"+data.mensajeId,
					true
				)
				break
			case "desaparecido":
				markDisappeared("msg-"+data.mensajeId)
				break
				
			case "desconocido":
				markDesconocido(tempMap.last)
				break
		}
	}
}

function sendMessage(){
	const destino=document.getElementById("destino").value.trim()
	const mensaje=document.getElementById("mensaje").value.trim()
	if(!mensaje) return
	const tempId="tmp-"+Date.now()
	tempMap.last=tempId
	socket.send(JSON.stringify({
		origen:origen,
		destino:destino,
		mensaje:mensaje
	}))
	addMessage(mensaje,"me","⏳ Enviando...",tempId)
	document.getElementById("mensaje").value=""
}

function marcarVisto(id){
	const mensajeId=id.replace("msg-","")
	socket.send(JSON.stringify({type:"seen",origen:origen,mensajeId:mensajeId}))
	const el=document.getElementById(id)
	if(el) el.querySelector(".meta").innerHTML="✔ visto"
}
</script>

</body>
</html>
