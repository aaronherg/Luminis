<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMINIS CHAT</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="terminal-container">

  <div class="terminal-header">
    <div class="mac-buttons">
      <div class="mac-btn red"></div>
      <div class="mac-btn yellow"></div>
      <div class="mac-btn green"></div>
    </div>
    <div class="header-right">
      <span id="status">Conectando...</span>
    </div>
  </div>

  <div class="terminal-body">
      <div id="messages" class="chat-messages"></div>

      <div class="cli-input">
        <span class="prompt">&gt;</span>
        <input id="mensaje" placeholder="Escribe un mensaje..." autocomplete="off" />
        <button id="sendBtn" class="send-btn">Enviar</button>
      </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
